name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      preview_id:
        description: 'Preview ID (for preview deploys, e.g. "test-1")'
        required: false
        default: 'manual-test'

env:
  AWS_REGION: ap-south-1
  AMPLIFY_APP_ID: dr1eqhpsk9y2d

jobs:
  # Manual preview deployment (for testing)
  deploy-manual-preview:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_type == 'preview'
    runs-on: ubuntu-latest
    environment: Preview

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set preview branch name
        id: preview
        run: |
          BRANCH_NAME="${{ inputs.preview_id }}"
          PREVIEW_URL="https://${BRANCH_NAME}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "Preview URL will be: ${PREVIEW_URL}"

      - name: Create or update preview branch in Amplify
        run: |
          BRANCH="${{ steps.preview.outputs.branch }}"

          # Check if branch exists
          if aws amplify get-branch --app-id ${{ env.AMPLIFY_APP_ID }} --branch-name "$BRANCH" 2>/dev/null; then
            echo "Branch $BRANCH already exists, updating..."
          else
            echo "Creating new branch $BRANCH..."
            aws amplify create-branch \
              --app-id ${{ env.AMPLIFY_APP_ID }} \
              --branch-name "$BRANCH" \
              --stage DEVELOPMENT \
              --no-enable-auto-build
          fi

      - name: Sync Preview environment variables
        env:
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ steps.preview.outputs.url }}
          DB_SERVICE_URL: ${{ secrets.DB_SERVICE_URL }}
          DB_SERVICE_TOKEN: ${{ secrets.DB_SERVICE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DYNAMODB_URL: ${{ secrets.DYNAMODB_URL }}
          DYNAMODB_REGION: ${{ secrets.DYNAMODB_REGION }}
          DYNAMODB_ACCESS_KEY: ${{ secrets.DYNAMODB_ACCESS_KEY }}
          DYNAMODB_SECRET_KEY: ${{ secrets.DYNAMODB_SECRET_KEY }}
          AF_ACCESS_KEY_ID: ${{ secrets.AF_ACCESS_KEY_ID }}
          AF_SECRET_ACCESS_KEY: ${{ secrets.AF_SECRET_ACCESS_KEY }}
          AF_TOPIC_ARN: ${{ secrets.AF_TOPIC_ARN }}
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          BRANCH="${{ steps.preview.outputs.branch }}"
          ENV_VARS=$(jq -n \
            --arg a "$DATABASE_HOST" \
            --arg b "$DATABASE_PORT" \
            --arg c "$DATABASE_USER" \
            --arg d "$DATABASE_PASSWORD" \
            --arg e "$DATABASE_NAME" \
            --arg f "$GOOGLE_CLIENT_ID" \
            --arg g "$GOOGLE_CLIENT_SECRET" \
            --arg h "$NEXTAUTH_SECRET" \
            --arg i "$NEXTAUTH_URL" \
            --arg j "$DB_SERVICE_URL" \
            --arg k "$DB_SERVICE_TOKEN" \
            --arg l "$GOOGLE_SERVICE_ACCOUNT_JSON" \
            --arg m "$DYNAMODB_URL" \
            --arg n "$DYNAMODB_REGION" \
            --arg o "$DYNAMODB_ACCESS_KEY" \
            --arg p "$DYNAMODB_SECRET_KEY" \
            --arg q "$AF_ACCESS_KEY_ID" \
            --arg r "$AF_SECRET_ACCESS_KEY" \
            --arg s "$AF_TOPIC_ARN" \
            --arg t "$APP_ENV" \
            '{
              DATABASE_HOST: $a,
              DATABASE_PORT: $b,
              DATABASE_USER: $c,
              DATABASE_PASSWORD: $d,
              DATABASE_NAME: $e,
              GOOGLE_CLIENT_ID: $f,
              GOOGLE_CLIENT_SECRET: $g,
              NEXTAUTH_SECRET: $h,
              NEXTAUTH_URL: $i,
              DB_SERVICE_URL: $j,
              DB_SERVICE_TOKEN: $k,
              GOOGLE_SERVICE_ACCOUNT_JSON: $l,
              DYNAMODB_URL: $m,
              DYNAMODB_REGION: $n,
              DYNAMODB_ACCESS_KEY: $o,
              DYNAMODB_SECRET_KEY: $p,
              AF_ACCESS_KEY_ID: $q,
              AF_SECRET_ACCESS_KEY: $r,
              AF_TOPIC_ARN: $s,
              APP_ENV: $t
            }')
          aws amplify update-branch \
            --app-id ${{ env.AMPLIFY_APP_ID }} \
            --branch-name "$BRANCH" \
            --environment-variables "$ENV_VARS"

      - name: Trigger preview build
        run: |
          aws amplify start-job \
            --app-id ${{ env.AMPLIFY_APP_ID }} \
            --branch-name "${{ steps.preview.outputs.branch }}" \
            --job-type RELEASE

          echo "============================================"
          echo "Preview deployment triggered!"
          echo "URL: ${{ steps.preview.outputs.url }}"
          echo "Console: https://console.aws.amazon.com/amplify/home#/${{ env.AMPLIFY_APP_ID }}/${{ steps.preview.outputs.branch }}"
          echo "============================================"

  # Deploy preview for PRs (uses Preview environment)
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: Preview

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Push PR code to staging branch
        run: |
          git push origin HEAD:refs/heads/staging --force

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set preview branch name
        id: preview
        run: |
          # All PRs deploy to the same stable staging URL
          BRANCH="staging"
          PREVIEW_URL="https://${BRANCH}.${AMPLIFY_APP_ID}.amplifyapp.com"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Create or update preview branch in Amplify
        run: |
          BRANCH="${{ steps.preview.outputs.branch }}"

          # Check if branch exists
          if aws amplify get-branch --app-id ${{ env.AMPLIFY_APP_ID }} --branch-name "$BRANCH" 2>/dev/null; then
            echo "Branch $BRANCH already exists, updating..."
          else
            echo "Creating new branch $BRANCH..."
            aws amplify create-branch \
              --app-id ${{ env.AMPLIFY_APP_ID }} \
              --branch-name "$BRANCH" \
              --stage DEVELOPMENT \
              --no-enable-auto-build
          fi

      - name: Sync Preview environment variables
        env:
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ steps.preview.outputs.url }}
          DB_SERVICE_URL: ${{ secrets.DB_SERVICE_URL }}
          DB_SERVICE_TOKEN: ${{ secrets.DB_SERVICE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DYNAMODB_URL: ${{ secrets.DYNAMODB_URL }}
          DYNAMODB_REGION: ${{ secrets.DYNAMODB_REGION }}
          DYNAMODB_ACCESS_KEY: ${{ secrets.DYNAMODB_ACCESS_KEY }}
          DYNAMODB_SECRET_KEY: ${{ secrets.DYNAMODB_SECRET_KEY }}
          AF_ACCESS_KEY_ID: ${{ secrets.AF_ACCESS_KEY_ID }}
          AF_SECRET_ACCESS_KEY: ${{ secrets.AF_SECRET_ACCESS_KEY }}
          AF_TOPIC_ARN: ${{ secrets.AF_TOPIC_ARN }}
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          BRANCH="${{ steps.preview.outputs.branch }}"
          ENV_VARS=$(jq -n \
            --arg a "$DATABASE_HOST" \
            --arg b "$DATABASE_PORT" \
            --arg c "$DATABASE_USER" \
            --arg d "$DATABASE_PASSWORD" \
            --arg e "$DATABASE_NAME" \
            --arg f "$GOOGLE_CLIENT_ID" \
            --arg g "$GOOGLE_CLIENT_SECRET" \
            --arg h "$NEXTAUTH_SECRET" \
            --arg i "$NEXTAUTH_URL" \
            --arg j "$DB_SERVICE_URL" \
            --arg k "$DB_SERVICE_TOKEN" \
            --arg l "$GOOGLE_SERVICE_ACCOUNT_JSON" \
            --arg m "$DYNAMODB_URL" \
            --arg n "$DYNAMODB_REGION" \
            --arg o "$DYNAMODB_ACCESS_KEY" \
            --arg p "$DYNAMODB_SECRET_KEY" \
            --arg q "$AF_ACCESS_KEY_ID" \
            --arg r "$AF_SECRET_ACCESS_KEY" \
            --arg s "$AF_TOPIC_ARN" \
            --arg t "$APP_ENV" \
            '{
              DATABASE_HOST: $a,
              DATABASE_PORT: $b,
              DATABASE_USER: $c,
              DATABASE_PASSWORD: $d,
              DATABASE_NAME: $e,
              GOOGLE_CLIENT_ID: $f,
              GOOGLE_CLIENT_SECRET: $g,
              NEXTAUTH_SECRET: $h,
              NEXTAUTH_URL: $i,
              DB_SERVICE_URL: $j,
              DB_SERVICE_TOKEN: $k,
              GOOGLE_SERVICE_ACCOUNT_JSON: $l,
              DYNAMODB_URL: $m,
              DYNAMODB_REGION: $n,
              DYNAMODB_ACCESS_KEY: $o,
              DYNAMODB_SECRET_KEY: $p,
              AF_ACCESS_KEY_ID: $q,
              AF_SECRET_ACCESS_KEY: $r,
              AF_TOPIC_ARN: $s,
              APP_ENV: $t
            }')
          aws amplify update-branch \
            --app-id ${{ env.AMPLIFY_APP_ID }} \
            --branch-name "$BRANCH" \
            --environment-variables "$ENV_VARS"

      - name: Trigger preview build
        run: |
          aws amplify start-job \
            --app-id ${{ env.AMPLIFY_APP_ID }} \
            --branch-name "${{ steps.preview.outputs.branch }}" \
            --job-type RELEASE \
            --commit-id ${{ github.event.pull_request.head.sha }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview.outputs.url }}';
            const body = `## 🚀 Preview Deployment

            | | |
            |---|---|
            | **URL** | ${previewUrl} |
            | **Branch** | \`${{ steps.preview.outputs.branch }}\` |
            | **Commit** | \`${context.sha.substring(0, 7)}\` |

            > Preview uses **Preview** environment variables.
            > May take 2-3 minutes to be ready.`;

            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # Deploy to production when merged to main
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate production URL
        id: url
        run: |
          URL="https://lms.avantifellows.org"
          echo "value=${URL}" >> $GITHUB_OUTPUT

      - name: Sync production environment variables
        env:
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ steps.url.outputs.value }}
          DB_SERVICE_URL: ${{ secrets.DB_SERVICE_URL }}
          DB_SERVICE_TOKEN: ${{ secrets.DB_SERVICE_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DYNAMODB_URL: ${{ secrets.DYNAMODB_URL }}
          DYNAMODB_REGION: ${{ secrets.DYNAMODB_REGION }}
          DYNAMODB_ACCESS_KEY: ${{ secrets.DYNAMODB_ACCESS_KEY }}
          DYNAMODB_SECRET_KEY: ${{ secrets.DYNAMODB_SECRET_KEY }}
          AF_ACCESS_KEY_ID: ${{ secrets.AF_ACCESS_KEY_ID }}
          AF_SECRET_ACCESS_KEY: ${{ secrets.AF_SECRET_ACCESS_KEY }}
          AF_TOPIC_ARN: ${{ secrets.AF_TOPIC_ARN }}
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          ENV_VARS=$(jq -n \
            --arg a "$DATABASE_HOST" \
            --arg b "$DATABASE_PORT" \
            --arg c "$DATABASE_USER" \
            --arg d "$DATABASE_PASSWORD" \
            --arg e "$DATABASE_NAME" \
            --arg f "$GOOGLE_CLIENT_ID" \
            --arg g "$GOOGLE_CLIENT_SECRET" \
            --arg h "$NEXTAUTH_SECRET" \
            --arg i "$NEXTAUTH_URL" \
            --arg j "$DB_SERVICE_URL" \
            --arg k "$DB_SERVICE_TOKEN" \
            --arg l "$GOOGLE_SERVICE_ACCOUNT_JSON" \
            --arg m "$DYNAMODB_URL" \
            --arg n "$DYNAMODB_REGION" \
            --arg o "$DYNAMODB_ACCESS_KEY" \
            --arg p "$DYNAMODB_SECRET_KEY" \
            --arg q "$AF_ACCESS_KEY_ID" \
            --arg r "$AF_SECRET_ACCESS_KEY" \
            --arg s "$AF_TOPIC_ARN" \
            --arg t "$APP_ENV" \
            '{
              DATABASE_HOST: $a,
              DATABASE_PORT: $b,
              DATABASE_USER: $c,
              DATABASE_PASSWORD: $d,
              DATABASE_NAME: $e,
              GOOGLE_CLIENT_ID: $f,
              GOOGLE_CLIENT_SECRET: $g,
              NEXTAUTH_SECRET: $h,
              NEXTAUTH_URL: $i,
              DB_SERVICE_URL: $j,
              DB_SERVICE_TOKEN: $k,
              GOOGLE_SERVICE_ACCOUNT_JSON: $l,
              DYNAMODB_URL: $m,
              DYNAMODB_REGION: $n,
              DYNAMODB_ACCESS_KEY: $o,
              DYNAMODB_SECRET_KEY: $p,
              AF_ACCESS_KEY_ID: $q,
              AF_SECRET_ACCESS_KEY: $r,
              AF_TOPIC_ARN: $s,
              APP_ENV: $t
            }')
          aws amplify update-branch \
            --app-id ${{ env.AMPLIFY_APP_ID }} \
            --branch-name main \
            --environment-variables "$ENV_VARS"

      # Amplify auto-build is enabled on main — it triggers a build on every
      # push automatically. The env vars synced above will be picked up by
      # that build. No need to call start-job (which races with auto-build).
      - name: Verify build is running
        run: |
          LATEST=$(aws amplify list-jobs \
            --app-id ${{ env.AMPLIFY_APP_ID }} \
            --branch-name main \
            --max-results 1 \
            --query "jobSummaries[0].{id:jobId,status:status,commit:commitId}" \
            --output table 2>/dev/null || true)

          echo "============================================"
          echo "Production env vars synced."
          echo "Amplify auto-build will deploy to: ${{ steps.url.outputs.value }}"
          echo ""
          echo "Latest job:"
          echo "$LATEST"
          echo "============================================"
